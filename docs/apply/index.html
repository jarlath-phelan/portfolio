<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pick One and Apply</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f5f6fa;
            color: #2c3e50;
            padding: 20px;
            max-width: 800px;
            margin: 0 auto;
        }
        h1 { margin-bottom: 8px; }
        .subtitle { color: #7f8c8d; margin-bottom: 20px; font-size: 14px; }
        .role-card {
            background: white;
            border-radius: 8px;
            padding: 16px 20px;
            margin: 12px 0;
            border-left: 4px solid #bdc3c7;
            cursor: pointer;
            transition: box-shadow 0.2s, border-color 0.2s;
        }
        .role-card:hover { box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        .role-card.selected {
            border-left-color: #2ecc71;
            box-shadow: 0 2px 12px rgba(46,204,113,0.3);
        }
        .role-card.strong { border-left-color: #2ecc71; }
        .role-card.good { border-left-color: #3498db; }
        .role-header {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
        }
        .role-rank { color: #95a5a6; font-size: 14px; margin-right: 8px; }
        .role-title { font-weight: 600; font-size: 15px; }
        .role-company { font-weight: 600; }
        .role-score { font-size: 20px; font-weight: bold; }
        .score-strong { color: #2ecc71; }
        .score-good { color: #3498db; }
        .role-meta { font-size: 12px; color: #7f8c8d; margin-top: 6px; }
        .role-salary { font-weight: bold; margin-left: 8px; }
        .salary-actual { color: #27ae60; }
        .salary-estimated { color: #7f8c8d; }
        .score-bars {
            display: flex;
            gap: 16px;
            margin-top: 8px;
            font-size: 11px;
            color: #95a5a6;
        }
        .score-bar-bg {
            background: #eee;
            border-radius: 3px;
            height: 6px;
            width: 60px;
            display: inline-block;
            vertical-align: middle;
        }
        .score-bar-fill { border-radius: 3px; height: 6px; display: block; }
        .bar-high { background: #2ecc71; }
        .bar-mid { background: #f39c12; }
        .bar-low { background: #e74c3c; }
        .fit-notes {
            font-size: 13px;
            color: #555;
            font-style: italic;
            margin-top: 8px;
        }
        .confidence {
            font-size: 10px;
            padding: 1px 6px;
            border-radius: 3px;
            color: white;
            margin-left: 8px;
        }
        .conf-high { background: #27ae60; }
        .conf-medium { background: #f39c12; }
        .conf-low { background: #e74c3c; }
        .apply-btn {
            display: block;
            width: 100%;
            padding: 14px;
            background: #2ecc71;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 20px;
            transition: background 0.2s;
        }
        .apply-btn:hover { background: #27ae60; }
        .apply-btn:disabled { background: #bdc3c7; cursor: not-allowed; }
        .status { text-align: center; margin-top: 12px; font-size: 14px; }
        .status.success { color: #27ae60; }
        .status.error { color: #e74c3c; }
        .settings-toggle {
            font-size: 12px;
            color: #95a5a6;
            cursor: pointer;
            text-align: right;
            margin-bottom: 12px;
        }
        .settings-toggle:hover { color: #3498db; }
        .settings-section {
            background: white;
            padding: 16px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: none;
        }
        .settings-section.visible { display: block; }
        .settings-section label { font-size: 13px; color: #555; display: block; margin-bottom: 6px; }
        .token-input {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 14px;
        }
        .token-saved {
            font-size: 12px;
            color: #27ae60;
            margin-top: 6px;
        }
        .loading { text-align: center; padding: 40px; color: #95a5a6; }
        .empty { text-align: center; padding: 40px; color: #95a5a6; }
    </style>
</head>
<body>
    <h1>Pick One and Apply</h1>
    <p class="subtitle">Select one role, click Apply, and tailored materials will be generated automatically.</p>

    <div class="settings-toggle" id="settings-toggle"></div>
    <div class="settings-section" id="settings-section">
        <label for="gh-token">GitHub Personal Access Token (stored in your browser only):</label>
        <input type="password" id="gh-token" class="token-input"
               placeholder="ghp_...">
        <div class="token-saved" id="token-saved" style="display:none;">Token saved.</div>
    </div>

    <div id="roles-container">
        <div class="loading">Loading today's matches...</div>
    </div>

    <button class="apply-btn" id="apply-btn" disabled>Select a role to apply</button>
    <div class="status" id="status"></div>

    <script src="submit.js"></script>
</body>
</html>
