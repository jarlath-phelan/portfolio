<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pick One and Apply</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f5f6fa;
            color: #2c3e50;
            padding: 20px;
            max-width: 800px;
            margin: 0 auto;
        }
        h1 { margin-bottom: 8px; }
        .subtitle { color: #7f8c8d; margin-bottom: 20px; font-size: 14px; }
        .role-card {
            background: white;
            border-radius: 8px;
            padding: 16px 20px;
            margin: 12px 0;
            border-left: 4px solid #bdc3c7;
            cursor: pointer;
            transition: box-shadow 0.2s, border-color 0.2s;
        }
        .role-card:hover { box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        .role-card.selected {
            border-left-color: #2ecc71;
            box-shadow: 0 2px 12px rgba(46,204,113,0.3);
        }
        .role-card.strong { border-left-color: #2ecc71; }
        .role-card.good { border-left-color: #3498db; }
        .role-header {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
        }
        .role-rank { color: #95a5a6; font-size: 14px; margin-right: 8px; }
        .role-title { font-weight: 600; font-size: 15px; }
        .role-company { font-weight: 600; }
        .role-score { font-size: 20px; font-weight: bold; }
        .score-strong { color: #2ecc71; }
        .score-good { color: #3498db; }
        .role-meta { font-size: 12px; color: #7f8c8d; margin-top: 6px; }
        .role-salary { font-weight: bold; margin-left: 8px; }
        .salary-actual { color: #27ae60; }
        .salary-estimated { color: #7f8c8d; }
        .score-bars {
            display: flex;
            gap: 16px;
            margin-top: 8px;
            font-size: 11px;
            color: #95a5a6;
        }
        .score-bar-bg {
            background: #eee;
            border-radius: 3px;
            height: 6px;
            width: 60px;
            display: inline-block;
            vertical-align: middle;
        }
        .score-bar-fill { border-radius: 3px; height: 6px; display: block; }
        .bar-high { background: #2ecc71; }
        .bar-mid { background: #f39c12; }
        .bar-low { background: #e74c3c; }
        .fit-notes {
            font-size: 13px;
            color: #555;
            font-style: italic;
            margin-top: 8px;
        }
        .confidence {
            font-size: 10px;
            padding: 1px 6px;
            border-radius: 3px;
            color: white;
            margin-left: 8px;
        }
        .conf-high { background: #27ae60; }
        .conf-medium { background: #f39c12; }
        .conf-low { background: #e74c3c; }
        .apply-btn {
            display: block;
            width: 100%;
            padding: 14px;
            background: #2ecc71;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 20px;
            transition: background 0.2s;
        }
        .apply-btn:hover { background: #27ae60; }
        .apply-btn:disabled { background: #bdc3c7; cursor: not-allowed; }
        .status { text-align: center; margin-top: 12px; font-size: 14px; }
        .status.success { color: #27ae60; }
        .status.error { color: #e74c3c; }
        .req-badges { margin-top: 6px; display: flex; gap: 6px; flex-wrap: wrap; }
        .req-badge {
            font-size: 10px;
            padding: 2px 8px;
            border-radius: 10px;
            font-weight: 600;
        }
        .badge-resume { background: #e8f5e9; color: #2e7d32; }
        .badge-cover { background: #e3f2fd; color: #1565c0; }
        .badge-essay { background: #fff3e0; color: #e65100; }
        .badge-new { background: #f3e5f5; color: #7b1fa2; }
        .confirm-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.5);
            z-index: 100;
            justify-content: center;
            align-items: center;
        }
        .confirm-overlay.visible { display: flex; }
        .confirm-panel {
            background: white;
            border-radius: 12px;
            padding: 24px 32px;
            max-width: 420px;
            width: 90%;
            box-shadow: 0 8px 32px rgba(0,0,0,0.2);
        }
        .confirm-panel h3 { margin-bottom: 12px; font-size: 16px; }
        .confirm-reqs { list-style: none; padding: 0; margin: 12px 0; }
        .confirm-reqs li { padding: 4px 0; font-size: 14px; }
        .confirm-reqs li::before { content: "\2713 "; color: #27ae60; font-weight: bold; }
        .confirm-options { margin: 16px 0; }
        .confirm-options label { font-size: 13px; color: #555; cursor: pointer; }
        .confirm-buttons { display: flex; gap: 12px; margin-top: 16px; }
        .confirm-buttons button {
            flex: 1;
            padding: 10px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            border: none;
        }
        .btn-cancel { background: #ecf0f1; color: #7f8c8d; }
        .btn-confirm { background: #2ecc71; color: white; }
        .sticky-footer {
            position: sticky;
            bottom: 0;
            background: #f5f6fa;
            padding: 12px 0 4px 0;
            border-top: 1px solid #e0e0e0;
            z-index: 10;
        }
        .loading { text-align: center; padding: 40px; color: #95a5a6; }
        .empty { text-align: center; padding: 40px; color: #95a5a6; }
    </style>
</head>
<body>
    <h1>Pick and Apply</h1>
    <p class="subtitle">Select one or more roles, click Apply, and tailored materials will be generated automatically.</p>

    <div id="roles-container">
        <div class="loading">Loading today's matches...</div>
    </div>

    <div class="sticky-footer" id="sticky-footer">
        <button class="apply-btn" id="apply-btn" disabled>Select a role to apply</button>
        <div class="status" id="status"></div>
    </div>

    <div class="confirm-overlay" id="confirm-overlay">
        <div class="confirm-panel">
            <h3 id="confirm-title">Confirm Application</h3>
            <p id="confirm-subtitle" style="font-size:13px;color:#555;margin-bottom:8px;"></p>
            <ul class="confirm-reqs" id="confirm-reqs"></ul>
            <div class="confirm-options" id="confirm-options"></div>
            <div class="confirm-buttons">
                <button class="btn-cancel" id="confirm-cancel">Cancel</button>
                <button class="btn-confirm" id="confirm-go">Generate Materials</button>
            </div>
        </div>
    </div>

    <script src="submit.js"></script>
</body>
</html>
